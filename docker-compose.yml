version: "3.9"

services:
  audioscript:
    build: .
    ports:
      - "8002:8002"
    volumes:
      # Edit frontend/index.html and refresh — no rebuild needed
      - ./frontend:/app/frontend:ro
      # Persist downloaded Whisper/pyannote model weights across restarts
      - whisper_models:/root/.cache/huggingface
      # Persist settings (HF token etc.) across restarts
      - amicoscript_settings:/root/.amicoscript
    environment:
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN:-}
    restart: unless-stopped

volumes:
  whisper_models:
  amicoscript_settings:
