services:
  audioscript:
    build: .
    volumes:
      - ./frontend:/app/frontend:ro
      - whisper_models:/root/.cache/huggingface
      - amicoscript_settings:/root/.amicoscript
    environment:
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN:-}
    restart: unless-stopped

volumes:
  whisper_models:
  amicoscript_settings:
